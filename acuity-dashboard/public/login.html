<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acuity Trading - Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #f0f0f0;
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #262626;
    border: 1px solid #3d3d3d;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    margin: 20px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'DM Serif Text', serif;
    font-size: 24px;
    font-weight: 400;
    color: #f0f0f0;
  }
  .logo h1 span { color: #FF8F14; }
  .logo p {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  .field {
    margin-bottom: 20px;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: #1a1a1a;
    border: 1px solid #3d3d3d;
    border-radius: 8px;
    color: #f0f0f0;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus {
    border-color: #FF8F14;
  }
  .btn {
    width: 100%;
    padding: 12px;
    background: #FF8F14;
    border: none;
    border-radius: 8px;
    color: #1a1a1a;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: #e74c3c20;
    border: 1px solid #e74c3c60;
    color: #e74c3c;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1><span>◆</span> Trading Performance</h1>
    <p>Acuity Trading Dashboard</p>
  </div>
  <div class="error" id="error"></div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
</div>
<script>
  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('error');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    err.style.display = 'none';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/';
      } else {
        err.textContent = data.error || 'Invalid credentials';
        err.style.display = 'block';
      }
    } catch (e) {
      err.textContent = 'Connection error';
      err.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
</script>
</body>
</html>
